{% extends 'base.html' %}


    {% block title %}
Login
{% endblock %}

{% block css %}

    <style>
        body{
            background:#f4f7fc;
        }

        .login-card{
            margin-top:100px;
            border:none;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }
    </style>

    {% endblock %}



    {% block content %}

<div class="container">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card login-card">

<div class="card-body p-4">

<h2 class="text-center mb-4">
Smart Quiz Login
</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <div class="text-end mb-3">

        <a href="{% url 'password_reset' %}"
           class="text-decoration-none">

            Forgot Password?

        </a>

    </div>

    <div class="d-grid">

        <button class="btn btn-primary">

            Login

        </button>

    </div>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
