{% extends "base.html" %}

{% block title %}
Change Password
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="card shadow p-5">

        <h2 class="mb-4">
            🔑 Change Password
        </h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-primary">
                Update Password
            </button>

        </form>

    </div>

</div>

{% endblock %}
