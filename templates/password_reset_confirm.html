{% extends "base.html" %}

{% block title %}
Set New Password
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="card shadow p-5 mx-auto" style="max-width:600px;">

        <h2 class="mb-4 text-center">
            🔑 Set New Password
        </h2>

        <form method="POST">

            {% csrf_token %}

            {% if form.errors %}
<div class="alert alert-danger">
    {{ form.errors }}
</div>
{% endif %}

{{ form.as_p }}

            <button type="submit" class="btn btn-success w-100">
                Update Password
            </button>

        </form>

    </div>

</div>

{% endblock %}
